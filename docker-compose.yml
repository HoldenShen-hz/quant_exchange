services:
  web:
    build: .
    image: quant-exchange:latest
    container_name: quant-exchange-web
    restart: unless-stopped
    ports:
      - "${QUANT_WEB_PORT:-8080}:8080"
    environment:
      - QUANT_WEB_HOST=0.0.0.0
      - QUANT_WEB_PORT=8080
      - QUANT_DB_URL=/home/quant/data/quant_exchange.sqlite3
    volumes:
      - quant_data:/home/quant/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  quant_data:
    driver: local
